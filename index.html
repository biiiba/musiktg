<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный Плеер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1a1a1a; color: #ffffff; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #e0e0e0; margin-bottom: 25px; }
        .player-box { background: #2d2d2d; border-radius: 12px; padding: 20px; text-align: center; }
        .track-title { font-weight: 600; font-size: 16px; margin-bottom: 15px; color: #1db954; id: title }
        audio { width: 100%; margin-top: 10px; }
        button { width: 100%; padding: 12px; background: #1db954; color: #fff; border: none; border-radius: 8px; font-size: 15px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Медиа Плеер</h2>
    <div class="player-box">
        <div class="track-title" id="track-name">Проверка обновлений...</div>
        <audio id="audio-element" controls></audio>
        <button onclick="checkTrack()">🔄 Обновить плеер</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Прокси для превращения http в https, чтобы обойти блокировку Mixed Content
    const proxy = "https://cors-anywhere.herokuapp.com/";
    const serverUrl = "http://93.115.101.152:11897";

    async function checkTrack() {
        const titleEl = document.getElementById('track-name');
        const audio = document.getElementById('audio-element');
        
        try {
            // Запрашиваем инфо о треке через прокси
            const res = await fetch(`${proxy}${serverUrl}/api/info`);
            const data = await res.json();
            
            if (data.ready) {
                titleEl.innerText = data.title;
                // Подгружаем сам mp3 файл через прокси
                audio.src = `${proxy}${serverUrl}/stream/track.mp3`;
                audio.load();
            } else {
                titleEl.innerText = "⏳ Бот еще скачивает трек...";
            }
        } catch (e) {
            titleEl.innerText = "🛑 Ошибка подключения к серверу бота";
        }
    }

    // Проверяем трек при старте приложения
    checkTrack();
</script>
</body>
</html>
