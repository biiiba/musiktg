<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный Плеер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1a1a1a; color: #ffffff; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #e0e0e0; margin-bottom: 25px; }
        .info-block { background: #2d2d2d; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .track-title { font-weight: 600; font-size: 16px; margin-bottom: 15px; color: #1db954; }
        audio { width: 100%; }
        .status { font-size: 13px; color: #aeaeae; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Медиа Плеер</h2>

    <div class="info-block">
        <div class="track-title">Последний трек из чата</div>
        <audio id="audio-element" controls></audio>
        <div class="status" id="status-text">Нажмите Play для воспроизведения трека, который вы скачали в чате бота.</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Подгружаем файл, который бот сохранил на сервере WispByte
    // Так как статический IP WispByte у нас 93.115.101.152 и порт плеера был настроен,
    // Мы подключаем стрим напрямую через стабильный файловый линк
    const audio = document.getElementById('audio-element');
    
    // Прямой адрес файла на твоем сервере WispByte
    audio.src = "http://93.115.101.152:11897/music/web_track.m4a";
    
    audio.addEventListener('error', () => {
        document.getElementById('status-text').innerText = "🔴 Трек еще не скачан в чате или бот выключен.";
    });
</script>
</body>
</html>
