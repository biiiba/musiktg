<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный Плеер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #e0e0e0;
            margin-bottom: 25px;
            font-weight: 500;
        }
        .input-block {
            background: #2d2d2d;
            border-radius: 12px;
            padding: 16px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #b0b0b0;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #3d3d3d;
            border: 1px solid #4d4d4d;
            border-radius: 8px;
            color: #fff;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #24a1de;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 12px;
            transition: background 0.2s, opacity 0.2s;
        }
        button:hover {
            background: #208ec4;
        }
        button:disabled {
            background: #444444 !important;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .player-card {
            background: #2d2d2d;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }
        .track-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
            color: #fff;
        }
        .track-artist {
            font-size: 13px;
            color: #b0b0b0;
            margin-bottom: 15px;
        }
        audio {
            width: 100%;
            margin-top: 5px;
        }
        .history-block {
            background: #2d2d2d;
            border-radius: 12px;
            padding: 16px;
        }
        .history-title {
            font-size: 14px;
            color: #b0b0b0;
            margin-bottom: 12px;
            border-bottom: 1px solid #3d3d3d;
            padding-bottom: 6px;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #3d3d3d;
            font-size: 14px;
            cursor: pointer;
        }
        .history-item:last-child {
            border-bottom: none;
        }
        .status {
            font-size: 13px;
            color: #aeaeae;
            text-align: center;
            margin-top: 14px;
            line-height: 1.5;
            padding: 6px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Медиа Плеер</h2>

    <div class="input-block">
        <label>Ссылка на YouTube трек или подкаст</label>
        <input type="text" id="track-url" placeholder="Вставьте ссылку...">
        <button id="load-btn">Загрузить в плеер</button>
        <div class="status" id="status-text">⚪ Скачивание не идет (ожидание ссылки)</div>
    </div>

    <div class="player-card" id="player-block">
        <div class="track-title" id="current-title">Название трека</div>
        <div class="track-artist" id="current-artist">Исполнитель</div>
        <audio id="audio-element" controls></audio>
    </div>

    <div class="history-block">
        <div class="history-title">История загрузок</div>
        <div id="history-list">
            <div style="color: #777; font-size: 13px; text-align: center; padding: 10px;">Список пуст</div>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let history = JSON.parse(localStorage.getItem('music_history') || '[]');
    updateHistoryUI();

    let statusInterval = null;

    function updateHistoryUI() {
        const list = document.getElementById('history-list');
        if (history.length === 0) {
            list.innerHTML = '<div style="color: #777; font-size: 13px; text-align: center; padding: 10px;">Список пуст</div>';
            return;
        }
        list.innerHTML = '';
        history.forEach((item) => {
            const row = document.createElement('div');
            row.className = 'history-item';
            row.innerHTML = `<div><strong>${item.title}</strong><br><small style="color:#888">${item.artist}</small></div><span style="color:#24a1de">▶</span>`;
            row.onclick = () => playTrack(item);
            list.appendChild(row);
        });
    }

    function playTrack(item) {
        document.getElementById('player-block').style.display = 'block';
        document.getElementById('current-title').innerText = item.title;
        document.getElementById('current-artist').innerText = item.artist;
        const audio = document.getElementById('audio-element');
        audio.src = item.url;
        audio.play().catch(e => {
            document.getElementById('status-text').innerHTML = '❌ Ошибка воспроизведения файла. Ссылка могла устареть.';
        });
    }

    function startLoadingAnimation(element, baseText) {
        let dots = 0;
        element.innerHTML = `🟡 <strong>${baseText}</strong>`;
        statusInterval = setInterval(() => {
            dots = (dots + 1) % 4;
            const dotStr = '.'.repeat(dots);
            element.innerHTML = `🟡 <strong>${baseText}${dotStr}</strong><br><small style="color:#aaa">Пожалуйста, не закрывайте вкладку</small>`;
        }, 500);
    }

    function stopLoadingAnimation() {
        if (statusInterval) {
            clearInterval(statusInterval);
            statusInterval = null;
        }
    }

    document.getElementById('load-btn').addEventListener('click', async () => {
        const urlInput = document.getElementById('track-url').value.trim();
        if (!urlInput) {
            alert('Пожалуйста, вставьте ссылку!');
            return;
        }

        const btn = document.getElementById('load-btn');
        const status = document.getElementById('status-text');

        // Блокировка элементов интерфейса
        btn.disabled = true;
        btn.innerText = 'Скачивание...';
        
        // Запуск динамического статуса загрузки
        startLoadingAnimation(status, 'Идет скачивание');

        try {
            // Попытка 1: Запрос на твой собственный Vercel API
            let response = await fetch('/api/download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: urlInput })
            });
            
            let data = await response.json();

            // Если твой сервер выдал таймаут или ошибку, пробуем резервный метод конвертации
            if (!data.success) {
                stopLoadingAnimation();
                startLoadingAnimation(status, 'Идет скачивание (резервный сервер)');
                
                // Используем стабильный альтернативный обработчик youtube контента
                const videoIdMatch = urlInput.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/watch\?.+&v=))/i);
                if (videoIdMatch) {
                    const fallbackRes = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://co.wuk.sh/api/json')}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: urlInput, aFormat: 'mp3', isAudioOnly: true })
                    });
                    const fallbackData = await fallbackRes.json();
                    const parsed = JSON.parse(fallbackData.contents);
                    
                    if (parsed.url) {
                        data = {
                            success: true,
                            title: parsed.text || 'YouTube Аудио',
                            artist: 'Загружено',
                            audioUrl: parsed.url
                        };
                    }
                }
            }

            stopLoadingAnimation();

            if (data.success && data.audioUrl) {
                status.innerHTML = '✅ <strong>Успешно загружено!</strong>';
                const newItem = { title: data.title, artist: data.artist, url: data.audioUrl };
                
                // Сохраняем в историю и обновляем UI
                history.unshift(newItem);
                localStorage.setItem('music_history', JSON.stringify(history));
                updateHistoryUI();
                
                // Автозапуск
                playTrack(newItem);
                document.getElementById('track-url').value = '';
            } else {
                status.innerHTML = '❌ <strong>Ошибка:</strong> ' + (data.error || 'Не удалось извлечь аудио из ссылки. Попробуйте другое видео.');
            }
        } catch (e) {
            stopLoadingAnimation();
            status.innerHTML = '❌ <strong>Ошибка соединения с сервером.</strong>';
            console.error(e);
        } finally {
            // Возвращаем кнопку в исходное состояние
            btn.disabled = false;
            btn.innerText = 'Загрузить в плеер';
            
            // Если процесс завершился без явных ошибок/успехов, сбрасываем статус
            setTimeout(() => {
                if (status.innerHTML.includes('Успешно') || status.innerHTML.includes('Ошибка')) return;
                status.innerHTML = '⚪ Скачивание не идет (ожидание ссылки)';
            }, 5000);
        }
    });
</script>
</body>
</html>
