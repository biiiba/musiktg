<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный Плеер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1a1a1a; color: #ffffff; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #e0e0e0; margin-bottom: 25px; }
        .player-box { background: #2d2d2d; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .track-title { font-weight: 600; font-size: 16px; margin-bottom: 15px; color: #1db954; min-height: 20px; }
        audio { width: 100%; margin-top: 15px; }
        button { width: 100%; padding: 12px; background: #1db954; color: #fff; border: none; border-radius: 8px; font-size: 15px; margin-top: 15px; cursor: pointer; font-weight: bold; }
        button:active { background: #1aa34a; }
    </style>
</head>
<body>

<div class="container">
    <h2>Медиа Плеер</h2>
    <div class="player-box">
        <div class="track-title" id="track-name">Проверка трека...</div>
        <audio id="audio-element" controls></audio>
        <button onclick="syncPlayer()">🔄 Обновить плеер</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Тот же самый ключ, что и в Python-коде бота
    const syncKey = "final_ultra_player_2026_prod";
    const kvdbUrl = `https://kvdb.io/MN876sX87asD6g7a6sD7f8/${syncKey}`;

    async function syncPlayer() {
        const titleEl = document.getElementById('track-name');
        const audio = document.getElementById('audio-element');
        
        try {
            const res = await fetch(kvdbUrl);
            if (!res.ok) throw new Error();
            const data = await res.json();
            
            if (data && data.url) {
                titleEl.innerText = data.title;
                if (audio.src !== data.url) {
                    audio.src = data.url;
                    audio.load();
                }
            } else {
                titleEl.innerText = "🎵 Отправь боту ссылку на YouTube";
            }
        } catch (e) {
            titleEl.innerText = "🎵 Плеер пуст. Отправь ссылку боту!";
        }
    }

    // Автоматическая проверка при каждом заходе в приложение
    syncPlayer();
</script>
</body>
</html>
