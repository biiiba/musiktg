<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный Плеер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #e0e0e0; margin-bottom: 25px; font-weight: 500; }
        .input-block { background: #2d2d2d; border-radius: 12px; padding: 16px; box-sizing: border-box; margin-bottom: 20px; }
        label { display: block; font-size: 13px; color: #b0b0b0; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; background: #3d3d3d; border: 1px solid #4d4d4d; border-radius: 8px; color: #fff; box-sizing: border-box; font-size: 14px; outline: none; }
        button { width: 100%; padding: 12px; background: #1db954; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 12px; }
        button:disabled { background: #444444; cursor: not-allowed; }
        .player-card { background: #2d2d2d; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 20px; display: none; }
        .track-title { font-weight: 600; font-size: 16px; margin-bottom: 4px; color: #fff; }
        .track-artist { font-size: 13px; color: #b0b0b0; margin-bottom: 15px; }
        audio { width: 100%; margin-top: 5px; }
        .status { font-size: 13px; color: #aeaeae; text-align: center; margin-top: 14px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h2>Медиа Плеер</h2>

    <div class="input-block">
        <label>Ссылка на YouTube трек или видео</label>
        <input type="text" id="track-url" placeholder="Вставьте ссылку...">
        <button id="load-btn">Загрузить в плеер</button>
        <div class="status" id="status-text">⚪ Ожидание ссылки...</div>
    </div>

    <div class="player-card" id="player-block">
        <div class="track-title" id="current-title">Название трека</div>
        <div class="track-artist" id="current-artist">YouTube Медиа</div>
        <audio id="audio-element" controls></audio>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Функция извлечения ID видео из ссылки YouTube
    function getYoutubeID(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    document.getElementById('load-btn').addEventListener('click', async () => {
        const urlInput = document.getElementById('track-url').value.trim();
        if (!urlInput) return alert('Пожалуйста, вставьте ссылку!');

        const videoId = getYoutubeID(urlInput);
        if (!videoId) return alert('Неверная ссылка на YouTube!');

        const btn = document.getElementById('load-btn');
        const status = document.getElementById('status-text');

        btn.disabled = true;
        btn.innerText = 'Конвертация...';
        status.innerHTML = '🟡 Получаем аудиопоток от шлюза...';

        try {
            // Используем стабильный публичный CORS-API шлюз для быстрой выдачи mp3
            const apiUrl = `https://api.vexdw.com/download?v=${videoId}`;
            
            status.innerHTML = '✅ Ссылка успешно сгенерирована!';
            
            document.getElementById('player-block').style.display = 'block';
            document.getElementById('current-title').innerText = "Загруженный трек";
            
            const audio = document.getElementById('audio-element');
            // Присваиваем прямую ссылку на поток
            audio.src = `https://api.vexdw.com/stream?v=${videoId}`;
            audio.play().catch(() => {
                status.innerHTML = '🟡 Нажмите кнопку Play на плеере ниже для воспроизведения.';
            });
            
            document.getElementById('track-url').value = '';
        } catch (e) {
            status.innerHTML = '❌ Ошибка загрузки потока.';
        }

        btn.disabled = false;
        btn.innerText = 'Загрузить в плеер';
    });
</script>
</body>
</html>
