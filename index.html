<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный Плеер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            vertical-align: middle;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #e0e0e0;
            margin-bottom: 25px;
            font-weight: 500;
        }
        .input-block {
            background: #2d2d2d;
            border-radius: 12px;
            padding: 16px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #b0b0b0;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #3d3d3d;
            border: 1px solid #4d4d4d;
            border-radius: 8px;
            color: #fff;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #555555;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 12px;
            transition: background 0.2s;
        }
        button:hover {
            background: #666666;
        }
        .player-card {
            background: #2d2d2d;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }
        .track-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }
        .track-artist {
            font-size: 13px;
            color: #b0b0b0;
            margin-bottom: 15px;
        }
        audio {
            width: 100%;
            margin-top: 5px;
        }
        .history-block {
            background: #2d2d2d;
            border-radius: 12px;
            padding: 16px;
        }
        .history-title {
            font-size: 14px;
            color: #b0b0b0;
            margin-bottom: 12px;
            border-bottom: 1px solid #3d3d3d;
            padding-bottom: 6px;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #3d3d3d;
            font-size: 14px;
            cursor: pointer;
        }
        .history-item:last-child {
            border-bottom: none;
        }
        .status {
            font-size: 13px;
            color: #b0b0b0;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Медиа Плеер</h2>

    <div class="input-block">
        <label>Ссылка на YouTube трек или подкаст</label>
        <input type="text" id="track-url" placeholder="Вставьте ссылку...">
        <button id="load-btn">Загрузить в плеер</button>
        <div class="status" id="status-text"></div>
    </div>

    <div class="player-card" id="player-block">
        <div class="track-title" id="current-title">Название трека</div>
        <div class="track-artist" id="current-artist">Исполнитель</div>
        <audio id="audio-element" controls></audio>
    </div>

    <div class="history-block">
        <div class="history-title">История загрузок</div>
        <div id="history-list">
            <div style="color: #777; font-size: 13px; text-align: center; padding: 10px;">Список пуст</div>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let history = JSON.parse(localStorage.getItem('music_history') || '[]');

    function updateHistoryUI() {
        const list = document.getElementById('history-list');
        if (history.length === 0) {
            list.innerHTML = '<div style="color: #777; font-size: 13px; text-align: center; padding: 10px;">Список пуст</div>';
            return;
        }
        list.innerHTML = '';
        history.forEach((item, index) => {
            const div = document.getElementById('history-list');
            const row = document.createElement('div');
            row.className = 'history-item';
            row.innerHTML = `<div><strong>${item.title}</strong><br><small style="color:#888">${item.artist}</small></div><span>▶</span>`;
            row.onclick = () => playTrack(item);
            list.appendChild(row);
        });
    }

    function playTrack(item) {
        document.getElementById('player-block').style.display = 'block';
        document.getElementById('current-title').innerText = item.title;
        document.getElementById('current-artist').innerText = item.artist;
        const audio = document.getElementById('audio-element');
        audio.src = item.url;
        audio.play();
    }

    document.getElementById('load-btn').addEventListener('click', async () => {
        const urlInput = document.getElementById('track-url').value.trim();
        if (!urlInput) return alert('Вставьте ссылку!');

        const status = document.getElementById('status-text');
        status.innerText = '⏳ Загрузка и конвертация на сервере...';

        try {
            const response = await fetch('/api/download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: urlInput })
            });
            const data = await response.json();

            if (data.success) {
                status.innerText = '✅ Успешно загружено!';
                const newItem = { title: data.title, artist: data.artist, url: data.audioUrl };
                history.unshift(newItem);
                localStorage.setItem('music_history', JSON.stringify(history));
                updateHistoryUI();
                playTrack(newItem);
                document.getElementById('track-url').value = '';
            } else {
                status.innerText = '❌ Ошибка: ' + data.error;
            }
        } catch (e) {
            status.innerText = '❌ Ошибка соединения с сервером.';
        }
    </script>
</body>
</html>
