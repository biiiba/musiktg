<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Медиа Плеер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: #fff; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        .input-block, .player-card, .history-block { background: #2d2d2d; border-radius: 12px; padding: 16px; margin-bottom: 20px; box-sizing: border-box; }
        input { width: 100%; padding: 12px; background: #3d3d3d; border: 1px solid #4d4d4d; border-radius: 8px; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1db954; color: #fff; border: none; border-radius: 8px; font-weight: bold; margin-top: 12px; cursor: pointer; }
        button:disabled { background: #444; }
        .status { font-size: 13px; color: #b0b0b0; text-align: center; margin-top: 10px; }
        audio { width: 100%; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Медиа Плеер</h2>
    <div class="input-block">
        <input type="text" id="track-url" placeholder="Вставьте ссылку на YouTube...">
        <button id="load-btn">Загрузить в плеер</button>
        <div class="status" id="status-text">⚪ Ожидание ссылки...</div>
    </div>

    <div class="player-card hidden" id="player-block">
        <div id="current-title" style="font-weight:bold;"></div>
        <div id="current-artist" style="color:#b0b0b0; font-size:13px; margin-bottom:10px;"></div>
        <audio id="audio-element" controls></audio>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const SERVER_URL = "http://93.115.101.152:11897/api/download";

    document.getElementById('load-btn').addEventListener('click', async () => {
        const urlInput = document.getElementById('track-url').value.trim();
        if (!urlInput) return alert('Вставьте ссылку!');

        const btn = document.getElementById('load-btn');
        const status = document.getElementById('status-text');

        btn.disabled = true;
        status.innerText = '⏳ Загрузка через твой сервер WispByte...';

        try {
            const response = await fetch(SERVER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: urlInput })
            });
            const data = await response.json();

            if (data.success) {
                status.innerText = '✅ Успешно загружено!';
                document.getElementById('player-block').classList.remove('hidden');
                document.getElementById('current-title').innerText = data.title;
                document.getElementById('current-artist').innerText = data.artist;
                
                const audio = document.getElementById('audio-element');
                audio.src = data.audioUrl;
                audio.play();
            } else {
                status.innerText = '❌ Ошибка: Сервер WispByte заблокирован YouTube. Попробуй другое видео.';
            }
        } catch (e) {
            status.innerText = '❌ Нет ответа от WispByte. Проверь, запущен ли бот.';
        }
        btn.disabled = false;
    });
</script>
</body>
</html>
